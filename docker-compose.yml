services:
  postgres:
    image: postgres:15-alpine
    container_name: thermops-postgres
    environment:
      POSTGRES_USER: thermops
      POSTGRES_PASSWORD: thermops
      POSTGRES_DB: thermops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # clean seed: demo 02_seed_demo.sql 은 자동 실행하지 않음
      - ./db/init/00_airflow_db.sh:/docker-entrypoint-initdb.d/00_airflow_db.sh:ro
      - ./db/init/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/init/02_seed_clean.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thermops -d thermops"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: thermops-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    container_name: thermops-mlflow
    entrypoint: ["/bin/bash", "/scripts/mlflow_entrypoint.sh"]
    volumes:
      - ./scripts/mlflow_entrypoint.sh:/scripts/mlflow_entrypoint.sh:ro
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thermops-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://thermops:thermops@postgres:5432/thermops
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      GIT_PYTHON_REFRESH: quiet
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      THERMOPS_PROJECT_ROOT: /workspace
      AIRFLOW_BASE_URL: http://airflow:8080
      AIRFLOW_USERNAME: admin
      AIRFLOW_PASSWORD: admin
      THERMOOPS_VP_RUN_EXECUTOR: ${THERMOOPS_VP_RUN_EXECUTOR:-background_tasks}
      THERMOOPS_VP_SCHEDULE_ACTIVATION_ENABLED: ${THERMOOPS_VP_SCHEDULE_ACTIVATION_ENABLED:-true}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml:/ml
      - ./configs:/configs
      - .:/workspace:ro
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
      minio:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  run-due-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thermops-run-due-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://thermops:thermops@postgres:5432/thermops
      THERMOOPS_RUN_DUE_WORKER_ENABLED: "true"
      THERMOOPS_RUN_DUE_WORKER_MODE: loop
      THERMOOPS_RUN_DUE_WORKER_NAME: run-due-worker-1
      THERMOOPS_RUN_DUE_POLL_INTERVAL_SECONDS: "60"
      THERMOOPS_RUN_DUE_LOCK_TTL_SECONDS: "120"
      THERMOOPS_RUN_DUE_MAX_BATCH_SIZE: "20"
      THERMOOPS_RUN_DUE_NOTIFICATION_ENABLED: "true"
      GIT_PYTHON_REFRESH: quiet
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    command: python -m app.workers.run_due_worker --mode loop
    restart: unless-stopped

  vp-run-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thermops-vp-run-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://thermops:thermops@postgres:5432/thermops
      THERMOOPS_VP_RUN_EXECUTOR: worker
      THERMOOPS_VP_RUN_WORKER_ENABLED: "true"
      THERMOOPS_VP_RUN_WORKER_MODE: loop
      THERMOOPS_VP_RUN_WORKER_POLL_INTERVAL_SECONDS: "5"
      THERMOOPS_VP_RUN_WORKER_LOCK_TTL_SECONDS: "120"
      THERMOOPS_VP_RUN_WORKER_MAX_BATCH_SIZE: "1"
      GIT_PYTHON_REFRESH: quiet
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    command: python -m app.workers.visual_pipeline_run_worker --mode loop
    restart: unless-stopped

  vp-schedule-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thermops-vp-schedule-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://thermops:thermops@postgres:5432/thermops
      THERMOOPS_VP_SCHEDULE_ACTIVATION_ENABLED: "true"
      THERMOOPS_VP_SCHEDULE_WORKER_ENABLED: "true"
      THERMOOPS_VP_SCHEDULE_WORKER_MODE: loop
      THERMOOPS_VP_SCHEDULE_WORKER_POLL_INTERVAL_SECONDS: "30"
      THERMOOPS_VP_SCHEDULE_WORKER_MAX_BATCH_SIZE: "10"
      GIT_PYTHON_REFRESH: quiet
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    command: python -m app.workers.visual_pipeline_schedule_worker --mode loop
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: thermops-frontend
    environment:
      VITE_API_BASE_URL: /api/v1
      VITE_USER_ROLE: ${VITE_USER_ROLE:-ADMIN}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: thermops-airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://thermops:thermops@postgres:5432/thermops_airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      THERMOps_DB_URL: postgresql://thermops:thermops@postgres:5432/thermops
      MLFLOW_TRACKING_URI: http://mlflow:5000
      THERMOPS_BACKEND_BASE_URL: http://backend:8000/api/v1
      THERMOPS_BACKEND_TIMEOUT: "300"
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./ml:/opt/airflow/ml
      - ./configs:/opt/airflow/configs
      - ./scripts/airflow_entrypoint.sh:/opt/airflow/entrypoint.sh
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    command: ["bash", "/opt/airflow/entrypoint.sh"]

volumes:
  postgres_data:
  minio_data:
