services:
  postgres:
    image: postgres:15-alpine
    container_name: thermops-postgres
    environment:
      POSTGRES_USER: thermops
      POSTGRES_PASSWORD: thermops
      POSTGRES_DB: thermops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thermops -d thermops"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: thermops-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    container_name: thermops-mlflow
    entrypoint: ["/bin/bash", "/scripts/mlflow_entrypoint.sh"]
    volumes:
      - ./scripts/mlflow_entrypoint.sh:/scripts/mlflow_entrypoint.sh:ro
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thermops-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://thermops:thermops@postgres:5432/thermops
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      GIT_PYTHON_REFRESH: quiet
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      THERMOPS_PROJECT_ROOT: /workspace
      AIRFLOW_BASE_URL: http://airflow:8080
      AIRFLOW_USERNAME: admin
      AIRFLOW_PASSWORD: admin
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml:/ml
      - ./configs:/configs
      - .:/workspace:ro
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
      minio:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: thermops-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
      VITE_USER_ROLE: ${VITE_USER_ROLE:-ADMIN}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: thermops-airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://thermops:thermops@postgres:5432/thermops_airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      THERMOps_DB_URL: postgresql://thermops:thermops@postgres:5432/thermops
      MLFLOW_TRACKING_URI: http://mlflow:5000
      THERMOPS_BACKEND_BASE_URL: http://backend:8000/api/v1
      THERMOPS_BACKEND_TIMEOUT: "300"
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./ml:/opt/airflow/ml
      - ./configs:/opt/airflow/configs
      - ./scripts/airflow_entrypoint.sh:/opt/airflow/entrypoint.sh
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    command: ["bash", "/opt/airflow/entrypoint.sh"]

volumes:
  postgres_data:
  minio_data:
